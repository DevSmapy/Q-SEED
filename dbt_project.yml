name: 'qseed_dbt'
version: '1.0.0'
config-version: 2

profile: 'qseed_dbt'

model-paths: ["dbt/models"]
analysis-paths: ["dbt/analyses"]
test-paths: ["dbt/tests"]
seed-paths: ["dbt/seeds"]
macro-paths: ["dbt/macros"]
snapshot-paths: ["dbt/snapshots"]

log-path: "logs"
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  qseed_dbt:
    +materialized: table
    stocks:
      staging:
        +materialized: view
      intermediate:
        +materialized: view
        # Heavy; enable with: dbt run --select int_stocks__daily_returns
        int_stocks__daily_returns:
          +enabled: false
      marts:
        +materialized: table
        # Heavy; enable with: dbt run --select fct_stocks__price_factors
        fct_stocks__price_factors:
          +enabled: false
    market:
      staging:
        +materialized: view
