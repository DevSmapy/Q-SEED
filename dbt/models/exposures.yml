    label: "주식 데이터 프로파일링 대시보드"
    type: dashboard
    maturity: high
    url: "http://localhost:8501"  # 추후 Streamlit 등 시각화 도구 주소
    description: >
      데이터 무결성 및 성능 최적화 대시보드.
      Null/Zero Rate 히트맵, 박스플롯 이상치 탐지, 스토리지 효율성 차트를 포함합니다.
    owner:
      name: "Data Engineer"
      email: data@example.com
    depends_on:
      - ref('profiling_stats')
      - ref('storage_metrics')
      - ref('summary')
