version: 2

models:
  - name: stg_stocks__raw_stocks
    description: "Staging pass-through of raw_stocks (stocks domain only)"

  - name: dim_stocks__market
    description: "Market → country / currency dimension"

  - name: rpt_stocks__overview
    description: "Global KPI row for stocks review dashboard"

  - name: rpt_stocks__coverage_by_market
    description: "Ticker and row counts by listing market"

  - name: rpt_stocks__coverage_by_country
    description: "Ticker and row counts by derived country"

  - name: rpt_stocks__freshness
    description: "Per-market last date and lag vs global max date"

  - name: rpt_stocks__history_length
    description: "Per-ticker history length and bucket"

  - name: rpt_stocks__data_quality
    description: >
      Per-ticker missingness vs weekday calendar (holidays inflate missing_rate_pct),
      zero-volume and OHLC anomaly counts

  - name: rpt_stocks__return_stats
    description: "Market-stratified daily return and price/volume summary stats"

  - name: int_stocks__daily_returns
    description: "Daily and 21d forward returns (stocks domain)"

  - name: int_stocks__liquidity
    description: "20-day ADV and dollar volume per ticker"

  - name: rpt_stocks__investable_universe
    description: "Price-derived investable flag and liquidity tier"

  - name: fct_stocks__price_factors
    description: "OHLCV price/volume factors SQL reference (stocks domain)"

  - name: stg_stocks__raw_security_metadata
    description: "Staging pass-through of raw_security_metadata"

  - name: dim_stocks__security
    description: "Latest security metadata per (Ticker, Market)"
    columns:
      - name: Ticker
        tests: [not_null]
      - name: Market
        tests: [not_null]
      - name: sector
        tests: [not_null]

  - name: rpt_stocks__coverage_by_sector
    description: "Ticker counts and pct by GICS-aligned sector"

  - name: rpt_stocks__sector_enrichment_queue
    description: "EQUITY tickers needing manual or external sector enrichment"
