version: 2

models:
  - name: stg_stocks__raw_stocks
    description: "Staging pass-through of raw_stocks (stocks domain only)"

  - name: dim_stocks__market
    description: "Market → country / currency dimension"

  - name: rpt_stocks__overview
    description: "Global KPI row for stocks review dashboard"

  - name: rpt_stocks__coverage_by_market
    description: "Ticker and row counts by listing market"

  - name: rpt_stocks__coverage_by_country
    description: "Ticker and row counts by derived country"

  - name: rpt_stocks__freshness
    description: "Per-market last date and lag vs global max date"

  - name: rpt_stocks__history_length
