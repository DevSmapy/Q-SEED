  - name: rpt_stocks__data_quality
    description: >
      Per-ticker missingness vs weekday calendar (holidays inflate missing_rate_pct),
      zero-volume and OHLC anomaly counts

  - name: rpt_stocks__return_stats
    description: "Market-stratified daily return and price/volume summary stats"

  - name: int_stocks__daily_returns
    description: "Daily and 21d forward returns (stocks domain)"

  - name: fct_stocks__price_factors
    description: "OHLCV price/volume factors SQL reference (stocks domain)"
