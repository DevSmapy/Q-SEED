version: 2

models:
  - name: stg_raw_stocks
    description: "staging model for raw_stocks"

  - name: summary
    description: "전체 데이터 요약 정보"
    columns:
      - name: total_row_count
        description: "전체 행 수"
      - name: total_ticker_count
        description: "전체 티커 수"

  - name: data_quality
    description: "티커별 데이터 개수 및 수집 기간"
    columns:
      - name: Ticker
        description: "티커명"
      - name: row_count
        description: "데이터 개수"

  - name: rpt_ticker_details
    description: "티커별 상세 정보"
    columns:
      - name: Ticker
        description: "티커명"
      - name: Market
        description: "시장명"
      - name: row_count
        description: "데이터 개수"
      - name: start_date
        description: "데이터 수집 시작 날짜"
      - name: end_date
        description: "데이터 수집 종료 날짜"
